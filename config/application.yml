# Application Configuration
# Shared across all services

environment: development

# PostgreSQL
postgres:
  host: postgres
  port: 5432
  database: clickstream
  username: admin
  password: admin123
  jdbc_url: jdbc:postgresql://postgres:5432/clickstream

# MinIO (S3-compatible)
minio:
  endpoint: http://minio:9000
  access_key: minioadmin
  secret_key: minioadmin123
  region: us-east-1
  buckets:
    bronze: clickstream-bronze
    silver: clickstream-silver
    gold: clickstream-gold

# Kafka
kafka:
  bootstrap_servers: kafka:9092
  schema_registry: http://schema-registry:8081
  topics:
    clicks: clicks
    sessions: sessions
  consumer:
    group_id: flink-consumer
    auto_offset_reset: earliest
    enable_auto_commit: false

# Spark
spark:
  master: spark://spark-master:7077
  app_name: clickstream-pipeline
  executor_memory: 2G
  driver_memory: 1G
  executor_cores: 2

# Flink
flink:
  jobmanager: flink-jobmanager:6123
  checkpoint_interval: 300000  # 5 minutes
  checkpointing_mode: exactly_once
  state_backend: rocksdb

# Airflow
airflow:
  dags_folder: /opt/airflow/dags
  executor: LocalExecutor
  load_examples: false

# Data Quality
great_expectations:
  checkpoint_action_name: action_on_validation_result
  data_asset_name: clickstream

# Monitoring
monitoring:
  metrics_enabled: true
  log_level: INFO
