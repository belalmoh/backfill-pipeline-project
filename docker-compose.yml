services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    profiles:
      - core
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: clickstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==================== DATA LAKE ====================
  minio:
    image: minio/minio:latest
    container_name: minio
    profiles:
      - core
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    mem_limit: ${MINIO_MEM_LIMIT:-512m}
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== KAFKA ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    profiles:
      - streaming
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "${ZOOKEEPER_HEAP_OPTS:--Xms256m -Xmx512m}"
    mem_limit: ${ZOOKEEPER_MEM_LIMIT:-768m}
    networks:
      - pipeline-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    profiles:
      - streaming
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "${KAFKA_HEAP_OPTS:--Xms256m -Xmx768m}"
    mem_limit: ${KAFKA_MEM_LIMIT:-1g}
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 3

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    profiles:
      - streaming
    depends_on:
      - kafka
    ports:
      - "8085:8085"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
      SCHEMA_REGISTRY_HEAP_OPTS: "${SCHEMA_REGISTRY_HEAP_OPTS:--Xms128m -Xmx384m}"
    mem_limit: ${SCHEMA_REGISTRY_MEM_LIMIT:-512m}
    networks:
      - pipeline-network

  # ==================== AIRFLOW ====================
  airflow-init:
    image: clickstream-airflow:local
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    container_name: airflow-init
    profiles:
      - orchestration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW_EXECUTOR:-SequentialExecutor}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin123@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=clickstream_secret_2025
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__PARALLELISM=${AIRFLOW_PARALLELISM:-2}
      - 'AIRFLOW_CONN_SPARK_DEFAULT={"conn_type":"spark","host":"spark://spark-master","port":7077,"extra":{"deploy-mode":"client"}}'
      - AIRFLOW_ADMIN_USERNAME=${AIRFLOW_ADMIN_USERNAME:-admin}
      - AIRFLOW_ADMIN_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-admin}
      - AIRFLOW_ADMIN_FIRSTNAME=${AIRFLOW_ADMIN_FIRSTNAME:-Admin}
      - AIRFLOW_ADMIN_LASTNAME=${AIRFLOW_ADMIN_LASTNAME:-User}
      - AIRFLOW_ADMIN_EMAIL=${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src:ro
      - airflow-logs:/opt/airflow/logs
    mem_limit: ${AIRFLOW_INIT_MEM_LIMIT:-768m}
    command:
      - bash
      - -c
      - |
        airflow db migrate && \
        (airflow users create \
          --username "$AIRFLOW_ADMIN_USERNAME" \
          --firstname "$AIRFLOW_ADMIN_FIRSTNAME" \
          --lastname "$AIRFLOW_ADMIN_LASTNAME" \
          --role Admin \
          --email "$AIRFLOW_ADMIN_EMAIL" \
          --password "$AIRFLOW_ADMIN_PASSWORD" \
        || airflow users reset-password \
          --username "$AIRFLOW_ADMIN_USERNAME" \
          --password "$AIRFLOW_ADMIN_PASSWORD")
    networks:
      - pipeline-network

  airflow-webserver:
    image: clickstream-airflow:local
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    container_name: airflow-webserver
    profiles:
      - orchestration
    depends_on:
        airflow-init:
          condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW_EXECUTOR:-SequentialExecutor}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin123@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=clickstream_secret_2025
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__PARALLELISM=${AIRFLOW_PARALLELISM:-2}
      - 'AIRFLOW_CONN_SPARK_DEFAULT={"conn_type":"spark","host":"spark://spark-master","port":7077,"extra":{"deploy-mode":"client"}}'
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src:ro
      - ./src/batch:/opt/spark/jobs
      - airflow-logs:/opt/airflow/logs
    mem_limit: ${AIRFLOW_WEBSERVER_MEM_LIMIT:-1g}
    command: webserver
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pipeline-network

  airflow-scheduler:
    image: clickstream-airflow:local
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    container_name: airflow-scheduler
    profiles:
      - orchestration
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=${AIRFLOW_EXECUTOR:-SequentialExecutor}
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:admin123@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=clickstream_secret_2025
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__CORE__PARALLELISM=${AIRFLOW_PARALLELISM:-2}
      - 'AIRFLOW_CONN_SPARK_DEFAULT={"conn_type":"spark","host":"spark://spark-master","port":7077,"extra":{"deploy-mode":"client"}}'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src:ro
      - ./src/batch:/opt/spark/jobs
      - airflow-logs:/opt/airflow/logs
    mem_limit: ${AIRFLOW_SCHEDULER_MEM_LIMIT:-1g}
    command: scheduler
    networks:
      - pipeline-network

  # ==================== SPARK ====================
  spark-master:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    container_name: spark-master
    profiles:
      - compute
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8082
      SPARK_DAEMON_MEMORY: ${SPARK_DAEMON_MEMORY:-512m}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_ENDPOINT_URL: http://minio:9000
    ports:
      - "8082:8082"
      - "7077:7077"
    volumes:
      - ./src/batch:/opt/spark/jobs
      - ./src/quality:/opt/spark/quality:ro
      - ./config:/opt/spark/config:ro
    mem_limit: ${SPARK_MASTER_MEM_LIMIT:-1g}
    networks:
      - pipeline-network

  spark-worker:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    container_name: spark-worker
    profiles:
      - compute
    depends_on:
      - spark-master
      - minio
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-1G}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-512M}
      SPARK_DAEMON_MEMORY: ${SPARK_DAEMON_MEMORY:-512m}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - ./src/batch:/opt/spark/jobs
      - ./src/quality:/opt/spark/quality:ro
      - ./config:/opt/spark/config:ro
    mem_limit: ${SPARK_WORKER_MEM_LIMIT:-1536m}
    command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - pipeline-network

  # ==================== UTILITIES ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles:
      - core
    ports:
      - "6379:6379"
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

networks:
  pipeline-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  airflow-logs:
